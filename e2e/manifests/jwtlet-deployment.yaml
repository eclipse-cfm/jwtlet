apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwtlet
  namespace: vault-e2e-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwtlet
  template:
    metadata:
      labels:
        app: jwtlet
    spec:
      serviceAccountName: jwtlet-sa
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Waiting for Postgres..."
            sleep 2
          done
          echo "Postgres is ready"
      - name: wait-for-vault
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          until wget -q -O- http://vault:8200/v1/sys/health > /dev/null 2>&1; do
            echo "Waiting for Vault..."
            sleep 2
          done
          echo "Vault is ready"
      containers:
      - name: vault-agent
        image: hashicorp/vault:1.15.0
        args:
        - agent
        - -config=/vault/config/agent.hcl
        - -log-level=info
        volumeMounts:
        - name: vault-agent-config
          mountPath: /vault/config
        - name: vault-secrets
          mountPath: /vault/secrets
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      - name: jwtlet
        image: jwtlet:local
        command:
        - sh
        - -c
        - |
          echo "Waiting for Vault token..."
          while [ ! -f /vault/secrets/.vault-token ]; do
            sleep 1
          done
          echo "Vault token available, starting Jwtlet..."
          exec /jwtlet-server
        ports:
        - containerPort: 8080
          name: token-exchange
        - containerPort: 8081
          name: management
        env:
        - name: RUST_LOG
          value: "info"
        - name: JWTLET_CONFIG_FILE
          value: /config/jwtlet.toml
        volumeMounts:
        - name: jwtlet-config
          mountPath: /config
          readOnly: true
        - name: vault-secrets
          mountPath: /vault/secrets
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: vault-agent-config
        configMap:
          name: vault-agent-config-jwtlet
      - name: jwtlet-config
        configMap:
          name: jwtlet-config
      - name: vault-secrets
        emptyDir:
          medium: Memory
